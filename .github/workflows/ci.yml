name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  test:
    name: Run Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx mocha "tests/**/*.test.js" --timeout 30000 --reporter spec --exit
        env:
          TEST_USER: ${{ secrets.TEST_USER }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          BASE_URL: ${{ secrets.BASE_URL }}
          TEST_TIMEOUT: ${{ secrets.TEST_TIMEOUT }}
          INVALID_EMAIL_DOMAIN: ${{ secrets.INVALID_EMAIL_DOMAIN }}
          ALREADY_REGISTERED_EMAIL: ${{ secrets.ALREADY_REGISTERED_EMAIL }}
